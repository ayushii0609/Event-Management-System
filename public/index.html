<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>EventSphere — Event Management System</title>
    <link rel="stylesheet" href="css/style.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>

    <header>
        <div class="logo">
            <i class="fa-solid fa-calendar-check"></i>
            <span>EventSphere</span>
        </div>
        <nav>
            <button class="nav-btn active" onclick="showPage('events')">All Events</button>
            <button class="nav-btn admin-only" onclick="showPage('add-event')" style="display:none;">+ Add Event</button>
            <span id="user-greeting" style="color:var(--text-dim);font-size:0.85rem;margin-right:4px;"></span>
            <button class="nav-btn" id="btn-logout" onclick="handleLogout()" style="display:none;">Logout</button>
            <button class="nav-btn" id="btn-login" onclick="window.location.href='login.html'">Login</button>
        </nav>
    </header>

    <div id="page-events" class="page active">
        <div class="page-header">
            <h1>Upcoming Events</h1>
            <p>Browse and register for events happening at your campus</p>
        </div>
        <div id="events-list" class="events-grid">
            <div class="loading-state">
                <i class="fa-solid fa-spinner fa-spin"></i>
                <p>Loading events...</p>
            </div>
        </div>
    </div>

    <div id="page-add-event" class="page">
        <div class="page-header">
            <h1>Add New Event</h1>
            <p>Fill in the details to create a new event</p>
        </div>
        <div class="form-card">
            <div class="form-row">
                <div class="form-group">
                    <label>Event Title *</label>
                    <input type="text" id="inp-title" placeholder="e.g. Annual Tech Fest 2025"/>
                </div>
                <div class="form-group">
                    <label>Organizer</label>
                    <input type="text" id="inp-organizer" placeholder="e.g. CS Department"/>
                </div>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="inp-description" rows="3" placeholder="Brief description of the event..."></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Location</label>
                    <input type="text" id="inp-location" placeholder="e.g. Main Auditorium"/>
                </div>
                <div class="form-group">
                    <label>Max Seats</label>
                    <input type="number" id="inp-seats" placeholder="50" min="1"/>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Event Date *</label>
                    <input type="date" id="inp-date"/>
                </div>
                <div class="form-group">
                    <label>Event Time</label>
                    <input type="time" id="inp-time"/>
                </div>
            </div>
            <button class="btn-primary" onclick="addEvent()">
                <i class="fa-solid fa-plus"></i> Create Event
            </button>
            <div id="add-event-msg" class="msg-box" style="display:none;"></div>
        </div>
    </div>

    <div id="modal-overlay" class="modal-overlay" onclick="closeModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 id="modal-event-title">Register for Event</h2>
                <button class="close-btn" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>

            <div class="modal-tabs">
                <button class="tab-btn active" onclick="switchTab('register', event)">Register</button>
                <button class="tab-btn" onclick="switchTab('attendees', event)">View Attendees</button>
            </div>

            <div id="tab-register">
                <div id="register-content"></div>
            </div>

            <div id="tab-attendees" style="display:none;">
                <div id="attendees-list"></div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
